name: Tests

on:
  push:
  pull_request:

jobs:
  docker-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tfg-gnn .

      - name: Run unit tests in Docker
        run: docker run --rm tfg-gnn python -m unittest discover -s tests
